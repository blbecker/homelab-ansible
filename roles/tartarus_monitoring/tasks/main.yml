---
# tasks file for roles/tartarus_monitoring
- name: Install smartd
  ansible.builtin.apt:
    name: smartmontools
    state: present

- name: Start and enable smartd
  ansible.builtin.service:
    name: smartd
    state: started
    enabled: true

- name: Configure smartd
  ansible.builtin.template:
    src: smartd.conf.j2
    dest: /etc/smartd.conf
    owner: root
    group: root
    mode: "0644"
  notify:
    - Restart smartd
